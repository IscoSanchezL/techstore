<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>IscoTech.Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;overflow-x:hidden}
body{background:#080810;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e8edf8;line-height:1.5}
#root{min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:12px 16px}
.logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#00e5ff,#d946ef);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#080810;box-shadow:0 0 20px rgba(0,229,255,.35);flex-shrink:0}
.spinner{width:38px;height:38px;border:3px solid rgba(0,229,255,.15);border-top-color:#00e5ff;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
/* Cards */
.card{background:linear-gradient(135deg,#0a0f1a,#141428);border:1px solid rgba(0,229,255,.1);border-radius:14px;overflow:hidden}
/* Buttons */
.btn{padding:11px 18px;border-radius:8px;border:none;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;white-space:nowrap;display:inline-block;text-align:center;transition:opacity .15s,transform .15s}
.btn-p{background:linear-gradient(135deg,#00e5ff,#d946ef);color:#080810}
.btn-s{background:rgba(255,255,255,.06);color:#a0a8b8;border:1px solid rgba(255,255,255,.12)}
.btn:active{opacity:.8;transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Inputs */
.inp{padding:12px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#e8edf8;outline:none;font-family:inherit;font-size:16px;width:100%;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:rgba(0,229,255,.5)}
/* Grid productos */
.grid{display:grid;gap:12px;margin-top:16px;grid-template-columns:repeat(2,1fr)}
@media(min-width:580px){.grid{grid-template-columns:repeat(3,1fr);gap:14px}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
/* Producto card */
.pcard{position:relative;cursor:pointer;transition:transform .2s;overflow:visible}
@media(hover:hover){.pcard:hover{transform:translateY(-4px)}}
.pimg{width:100%;height:155px;object-fit:cover;display:block}
@media(min-width:480px){.pimg{height:185px}}
@media(min-width:768px){.pimg{height:210px}}
.pcont{padding:11px}
.ptitle{font-size:13px;font-weight:700;margin-bottom:5px;background:linear-gradient(135deg,#fff,#e8edf8);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pprice{font-size:15px;font-weight:900;background:linear-gradient(135deg,#00e5ff,#d946ef);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pdesc{color:#a0b0c8;font-size:11px;line-height:1.4;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Admin action btns */
.acts{position:absolute;top:7px;right:7px;display:flex;gap:4px;z-index:2}
@media(hover:hover){.acts{opacity:0;transition:opacity .2s} .pcard:hover .acts{opacity:1}}
.abtn{width:32px;height:32px;border-radius:7px;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.abtn-e{background:rgba(0,229,255,.85)}
.abtn-d{background:rgba(239,68,68,.85)}
/* Form */
.fsec{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;margin-bottom:16px}
.fgrid{display:grid;gap:12px;margin-bottom:14px}
@media(min-width:580px){.fgrid{grid-template-columns:1fr 1fr}}
.fphoto{border:2px dashed rgba(0,229,255,.3);border-radius:8px;padding:18px;text-align:center;background:rgba(0,229,255,.02);margin:10px 0;cursor:pointer}
.fphoto:active{background:rgba(0,229,255,.06)}
.fprev{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-top:10px}
.fpi{position:relative}
.fpi img{width:100%;height:56px;object-fit:cover;border-radius:6px;display:block}
.fpi-rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#ef4444;color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
/* Modal detalle */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.modal-c{max-width:760px;margin:0 auto;background:#0d1120;border-radius:14px;overflow:hidden}
.modal-imgs{position:relative}
.mimg{width:100%;height:230px;object-fit:cover;display:block}
@media(min-width:480px){.mimg{height:290px}}
@media(min-width:768px){.mimg{height:370px}}
.mthumbs{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.mthumb{width:54px;height:54px;flex-shrink:0;object-fit:cover;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.mthumb.on{border-color:#00e5ff}
.minfo{padding:18px}
.mtitle{font-size:20px;font-weight:900;margin-bottom:9px;background:linear-gradient(135deg,#fff,#e8edf8);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@media(min-width:480px){.mtitle{font-size:24px}}
.mprice{font-size:22px;font-weight:900;background:linear-gradient(135deg,#00e5ff,#d946ef);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.mdesc{color:#a0b0c8;font-size:15px;line-height:1.65;margin-bottom:16px}
.close-btn{position:absolute;top:11px;right:11px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3}
/* Header admin */
.hdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding:14px 0;margin-bottom:4px}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.btitle{font-size:18px;font-weight:900;background:linear-gradient(135deg,#00e5ff,#d946ef);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bsub{font-size:11px;color:#8090b0;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.hbtns{display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:480px){
  .hdr{flex-direction:column;align-items:stretch}
  .hbtns{display:grid;grid-template-columns:1fr 1fr}
  .hbtns .btn-s:last-child{grid-column:span 2}
}
/* Login */
.lwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{width:100%;max-width:370px;text-align:center}
/* Grad text util */
.grad{background:linear-gradient(135deg,#00e5ff,#d946ef);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
</style>
</head>
<body>
<div id="root">
  <div class="center">
    <div>
      <div class="logo" style="margin:0 auto 16px">IT</div>
      <div class="spinner"></div>
      <p style="margin-top:14px;color:#5a6a90;font-size:14px">Cargando IscoTech.Store…</p>
    </div>
  </div>
</div>

<script type="module">
// ─── Imports via esm.sh (no CORS issues, works on file:// and GitHub Pages) ───
import { createElement as h, useState, useEffect, Fragment } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import { initializeApp, getApps } from 'https://esm.sh/firebase@10.12.0/app';
import { getDatabase, ref, onValue, off, update, push } from 'https://esm.sh/firebase@10.12.0/database';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://esm.sh/firebase@10.12.0/auth';

// ─── Firebase ───
const FB = {
  apiKey:            'AIzaSyAYKbbK7GqZgGKRl2-cWG8Gw8EGMYqS2HY',
  authDomain:        'techstore-4eea2.firebaseapp.com',
  databaseURL:       'https://techstore-4eea2-default-rtdb.firebaseio.com',
  projectId:         'techstore-4eea2',
  storageBucket:     'techstore-4eea2.firebasestorage.app',
  messagingSenderId: '429953715769',
  appId:             '1:429953715769:web:6b3bb7d79faf577ed707e8'
};
const app  = getApps().length ? getApps()[0] : initializeApp(FB);
const db   = getDatabase(app);
const auth = getAuth(app);

// ─── Utilidades ───
const GS = { background:'linear-gradient(135deg,#00e5ff,#d946ef)', backgroundClip:'text', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' };

const compressImg = (file, q = 0.65) => new Promise(res => {
  const c = document.createElement('canvas'), ctx = c.getContext('2d'), img = new Image();
  img.onload = () => {
    const m = 700, r = Math.min(m / img.width, m / img.height, 1);
    c.width = img.width * r; c.height = img.height * r;
    ctx.drawImage(img, 0, 0, c.width, c.height);
    res(c.toDataURL('image/jpeg', q));
  };
  const fr = new FileReader();
  fr.onload = e => { img.src = e.target.result; };
  fr.readAsDataURL(file);
});

const processImgs = async files => {
  const out = [];
  for (const f of files) if (f.type.startsWith('image/')) out.push(await compressImg(f));
  return out;
};

const Spinner = () => h('div', { className: 'center' },
  h('div', {},
    h('div', { className: 'logo', style: { margin: '0 auto 16px' } }, 'IT'),
    h('div', { className: 'spinner' }),
    h('p', { style: { marginTop: 14, color: '#8090b0', fontSize: 13 } }, 'Cargando…')
  )
);

// ═══════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════
function Login() {
  const [email, setEmail] = useState('');
  const [pass,  setPass]  = useState('');
  const [err,   setErr]   = useState('');
  const [busy,  setBusy]  = useState(false);

  const submit = async e => {
    e.preventDefault(); setBusy(true); setErr('');
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch { setErr('Correo o contraseña incorrectos'); }
    setBusy(false);
  };

  return h('div', { className: 'lwrap' },
    h('div', { className: 'fsec lcard' },
      h('div', { className: 'logo', style: { margin: '0 auto 20px' } }, 'IT'),
      h('h1', { style: { fontSize: 22, fontWeight: 900, marginBottom: 6, ...GS } }, 'IscoTech.Store'),
      h('p',  { style: { color: '#8090b0', fontSize: 13, marginBottom: 24 } }, 'Panel de Administración'),
      h('form', { onSubmit: submit },
        h('input', { className: 'inp', type: 'email', placeholder: 'Email', value: email, onChange: e => setEmail(e.target.value), style: { marginBottom: 12 }, required: true, autoComplete: 'email' }),
        h('input', { className: 'inp', type: 'password', placeholder: 'Contraseña', value: pass, onChange: e => setPass(e.target.value), style: { marginBottom: err ? 12 : 16 }, required: true, autoComplete: 'current-password' }),
        err && h('p', { style: { color: '#ef4444', fontSize: 13, marginBottom: 14, textAlign: 'center' } }, err),
        h('button', { className: 'btn btn-p', type: 'submit', disabled: busy, style: { width: '100%', padding: '13px' } }, busy ? 'Entrando…' : 'Iniciar Sesión')
      )
    )
  );
}

// ═══════════════════════════════════════════
//  ADMIN
// ═══════════════════════════════════════════
function Admin({ user }) {
  const [prods,    setProds]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [editId,   setEditId]   = useState(null);
  const [form,     setForm]     = useState({ name: '', price: '', description: '', photos: [] });

  useEffect(() => {
    const r = ref(db, 'products');
    const cb = snap => {
      const d = snap.val();
      setProds(d ? Object.keys(d).map(k => ({ id: k, ...d[k] })).filter(p => !p.deleted) : []);
      setLoading(false);
    };
    onValue(r, cb);
    return () => off(r, 'value', cb);
  }, []);

  const reset = () => { setForm({ name: '', price: '', description: '', photos: [] }); setEditId(null); setShowForm(false); };

  const startEdit = p => {
    setForm({ name: p.name || '', price: p.price || '', description: p.description || '', photos: p.photos || [] });
    setEditId(p.id); setShowForm(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const del = async id => {
    if (!confirm('¿Eliminar este producto?')) return;
    try { await update(ref(db, 'products/' + id), { deleted: true }); }
    catch { alert('Error al eliminar'); }
  };

  const save = async e => {
    e.preventDefault();
    const data = { ...form, updatedAt: Date.now(), deleted: false };
    try {
      if (editId) await update(ref(db, 'products/' + editId), data);
      else        await push(ref(db, 'products'), data);
      reset();
    } catch { alert('Error al guardar'); }
  };

  const addPhotos = async e => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    try {
      const imgs = await processImgs(files);
      setForm(p => ({ ...p, photos: [...p.photos, ...imgs] }));
    } catch { alert('Error procesando imágenes'); }
    e.target.value = '';
  };

  if (loading) return h(Spinner);

  return h('div', { className: 'container' },

    // Header
    h('div', { className: 'hdr' },
      h('div', { className: 'brand' },
        h('div', { className: 'logo' }, 'IT'),
        h('div', {},
          h('div', { className: 'btitle' }, 'IscoTech.Store'),
          h('div', { className: 'bsub' }, prods.length + ' productos · ' + user.email)
        )
      ),
      h('div', { className: 'hbtns' },
        h('button', { className: 'btn btn-s', onClick: () => window.open(location.pathname + '#catalogo', '_blank') }, '🌐 Catálogo'),
        h('button', { className: 'btn btn-p', onClick: () => { if (showForm) reset(); else { reset(); setShowForm(true); } } }, showForm ? 'Cancelar' : '+ Nuevo'),
        h('button', { className: 'btn btn-s', onClick: () => signOut(auth) }, 'Salir')
      )
    ),

    // Formulario
    showForm && h('div', { className: 'fsec' },
      h('form', { onSubmit: save },
        h('h3', { style: { marginBottom: 14, fontSize: 16, fontWeight: 700, color: '#e8edf8' } }, (editId ? 'Editar' : 'Nuevo') + ' Producto'),
        h('div', { className: 'fgrid' },
          h('input', { className: 'inp', type: 'text', placeholder: 'Nombre del producto *', value: form.name, onChange: e => setForm(p => ({ ...p, name: e.target.value })), required: true }),
          h('input', { className: 'inp', type: 'text', placeholder: 'Precio (ej: $150.000)', value: form.price, onChange: e => setForm(p => ({ ...p, price: e.target.value })) })
        ),
        h('textarea', { className: 'inp', placeholder: 'Descripción', value: form.description, onChange: e => setForm(p => ({ ...p, description: e.target.value })), style: { minHeight: 80, resize: 'vertical', marginBottom: 4 } }),
        h('div', {},
          h('div', { className: 'fphoto', onClick: () => document.getElementById('fi').click() },
            h('input', { id: 'fi', type: 'file', accept: 'image/*', multiple: true, onChange: addPhotos, style: { display: 'none' } }),
            h('p', { style: { color: '#00e5ff', fontSize: 14, fontWeight: 600 } }, '📷 Agregar fotos'),
            h('p', { style: { color: '#8090b0', fontSize: 12, marginTop: 4 } }, 'Puedes seleccionar varias a la vez')
          ),
          form.photos.length > 0 && h('div', { className: 'fprev' },
            form.photos.map((ph, i) =>
              h('div', { key: i, className: 'fpi' },
                h('img', { src: ph }),
                h('button', { className: 'fpi-rm', type: 'button', onClick: () => setForm(p => ({ ...p, photos: p.photos.filter((_, j) => j !== i) })) }, '×')
              )
            )
          )
        ),
        h('div', { style: { display: 'flex', gap: 10, marginTop: 14, flexWrap: 'wrap' } },
          h('button', { className: 'btn btn-p', type: 'submit', style: { flex: 1, minWidth: 100 } }, editId ? 'Actualizar' : 'Crear'),
          h('button', { className: 'btn btn-s', type: 'button', onClick: reset, style: { flex: 1, minWidth: 100 } }, 'Cancelar')
        )
      )
    ),

    // Lista de productos
    h('div', {},
      h('h2', { style: { fontSize: 15, fontWeight: 700, marginBottom: 12, color: '#e8edf8' } }, 'Productos (' + prods.length + ')'),
      prods.length > 0
        ? h('div', { className: 'grid' },
            prods.map(p =>
              h('div', { key: p.id, className: 'card pcard' },
                p.photos?.[0] && h('img', { src: p.photos[0], className: 'pimg' }),
                h('div', { className: 'pcont' },
                  h('h4', { className: 'ptitle' }, p.name || 'Sin nombre'),
                  h('div', { className: 'pprice' }, p.price || '—'),
                  p.description && h('p', { className: 'pdesc' }, p.description)
                ),
                h('div', { className: 'acts' },
                  h('button', { className: 'abtn abtn-e', onClick: ev => { ev.stopPropagation(); startEdit(p); } }, '✏️'),
                  h('button', { className: 'abtn abtn-d', onClick: ev => { ev.stopPropagation(); del(p.id); } }, '🗑️')
                )
              )
            )
          )
        : h('div', { style: { textAlign: 'center', padding: '40px 20px', color: '#8090b0' } },
            h('div', { style: { fontSize: 42, marginBottom: 12, opacity: .5 } }, '📦'),
            h('p', {}, 'Sin productos aún. Toca "+ Nuevo" para crear el primero.')
          )
    )
  );
}

// ═══════════════════════════════════════════
//  CATÁLOGO PÚBLICO
// ═══════════════════════════════════════════
function Catalog() {
  const [prods,   setProds]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [sel,     setSel]     = useState(null);
  const [imgI,    setImgI]    = useState(0);

  useEffect(() => {
    const r = ref(db, 'products');
    const cb = snap => {
      const d = snap.val();
      setProds(d ? Object.keys(d).map(k => ({ id: k, ...d[k] })).filter(p => !p.deleted) : []);
      setLoading(false);
    };
    onValue(r, cb);
    return () => off(r, 'value', cb);
  }, []);

  const open  = p => { setSel(p); setImgI(0); };
  const close = () => { setSel(null); setImgI(0); };

  if (loading) return h(Spinner);

  // Modal detalle
  if (sel) return h('div', { className: 'modal' },
    h('div', { className: 'modal-c' },
      h('button', { className: 'close-btn', onClick: close }, '×'),
      h('div', { className: 'modal-imgs' },
        sel.photos?.[0] && h('img', { className: 'mimg', src: sel.photos[imgI] || sel.photos[0] }),
        sel.photos?.length > 1 && h('div', { className: 'mthumbs' },
          sel.photos.map((ph, i) =>
            h('img', { key: i, src: ph, className: 'mthumb' + (i === imgI ? ' on' : ''), onClick: () => setImgI(i) })
          )
        )
      ),
      h('div', { className: 'minfo' },
        h('h1', { className: 'mtitle' }, sel.name || 'Sin nombre'),
        h('div', { className: 'mprice' }, sel.price || '—'),
        sel.description && h('p', { className: 'mdesc' }, sel.description),
        h('button', { className: 'btn btn-p', onClick: close, style: { width: '100%' } }, '← Volver al catálogo')
      )
    )
  );

  // Grid
  return h('div', { className: 'container' },
    h('div', { style: { textAlign: 'center', padding: '30px 0 14px' } },
      h('div', { className: 'logo', style: { margin: '0 auto 12px' } }, 'IT'),
      h('h1', { style: { fontSize: 24, fontWeight: 900, marginBottom: 4, ...GS } }, 'IscoTech.Store'),
      h('p',  { style: { color: '#8090b0', fontSize: 13 } }, prods.length + ' productos disponibles')
    ),
    prods.length > 0
      ? h('div', { className: 'grid' },
          prods.map(p =>
            h('div', { key: p.id, className: 'card pcard', onClick: () => open(p) },
              p.photos?.[0] && h('img', { src: p.photos[0], className: 'pimg' }),
              p.photos?.length > 1 && h('div', { style: { position: 'absolute', top: 7, right: 7, background: 'rgba(0,0,0,.65)', color: '#fff', padding: '2px 7px', borderRadius: 4, fontSize: 10, fontWeight: 700 } }, p.photos.length + ' 📷'),
              h('div', { className: 'pcont' },
                h('h3', { className: 'ptitle' }, p.name || 'Sin nombre'),
                h('div', { className: 'pprice' }, p.price || '—'),
                p.description && h('p', { className: 'pdesc' }, p.description)
              )
            )
          )
        )
      : h('div', { style: { textAlign: 'center', padding: '60px 20px', color: '#8090b0' } },
          h('div', { style: { fontSize: 46, marginBottom: 12, opacity: .5 } }, '🏪'),
          h('h3', { style: { fontSize: 16, fontWeight: 700, marginBottom: 8 } }, 'Catálogo en construcción'),
          h('p',  { style: { fontSize: 13 } }, 'Pronto nuevos productos')
        )
  );
}

// ═══════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════
function App() {
  const [user,    setUser]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [route,   setRoute]   = useState(location.hash);

  useEffect(() => {
    const unsub = onAuthStateChanged(auth, u => { setUser(u); setLoading(false); });
    const sync  = () => setRoute(location.hash);
    window.addEventListener('hashchange', sync);
    return () => { unsub(); window.removeEventListener('hashchange', sync); };
  }, []);

  if (loading)            return h(Spinner);
  if (route === '#catalogo') return h(Catalog);
  if (user)               return h(Admin, { user });
  return h(Login);
}
