const getTheme = (product) => {
  const themes = {
    'nuevo': { accent: '#22c55e', bg: '#f0fdf4', text: '#15803d' },
    'último': { accent: '#f59e0b', bg: '#fefbf3', text: '#d97706' },

  return themes[badge] || { accent: '#00e5ff', bg: '#f8fafc', text: '#475569' };
};

// Image Compression Utility
const compressImage = (file, maxWidth = 800, quality = 0.7) => {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    img.onload = () => {
      const ratio = Math.min(maxWidth / img.width, maxWidth / img.height);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    
    const reader = new FileReader();
    reader.onload = (e) => img.src = e.target.result;
    reader.readAsDataURL(file);
  });
};

  const [editingId, setEditingId] = React.useState(null);

    name: '',
    price: '',
    oldPrice: '',
    description: '',
    badge: '',
    specs: '',
    photos: []
  });

  React.useEffect(() => {
    const ref = db.ref('products');
    ref.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        const list = Object.keys(data).map(key => ({ id: key, ...data[key] }))
          .filter(p => !p.deleted);
        setProducts(list);
      }
      setLoading(false);
    });
    return () => ref.off();
  }, []);

  const resetForm = () => {
    setFormData({ name: '', price: '', oldPrice: '', description: '', badge: '', specs: '', photos: [] });
    setEditingId(null);
    setShowForm(false);
  };

  const handleEdit = (product) => {
    setFormData({
      name: product.name || '',
      price: product.price || '',
      oldPrice: product.oldPrice || '',
      description: product.description || '',
      badge: product.badge || '',
      specs: product.specs ? product.specs.join(', ') : '',
      photos: product.photos || []
    });
    setEditingId(product.id);
    setShowForm(true);
  };

  const handleDelete = async (id) => {
    if (confirm('¿Eliminar este producto?')) {
      await db.ref('products/' + id).update({ deleted: true });
    }
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    const specs = formData.specs ? formData.specs.split(',').map(s => s.trim()).filter(s => s) : [];
    const productData = { ...formData, specs, updatedAt: Date.now() };

    try {
      if (editingId) {
        await db.ref('products/' + editingId).update(productData);
      } else {
        await db.ref('products').push(productData);
      }
      resetForm();
    } catch (error) {
      alert('Error al guardar: ' + error.message);
    }
  };

  const handlePhotoUpload = async (e) => {
    const file = e.target.files[0];
    if (file) {
      try {
        const compressed = await compressImage(file);
        setFormData(prev => ({ ...prev, photos: [...prev.photos, compressed] }));
      } catch (error) {
        alert('Error al procesar imagen');
      }

          pointerEvents: 'none'
        }
      }),
      React.createElement('div', {
        key: 'content',
        style: {
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          flexWrap: 'wrap',
          gap: 16,
          position: 'relative'
        }

                  alignItems: 'center',
                  gap: 8,
                  padding: '4px 12px',
                  background: 'rgba(0,229,255,0.1)',
                  borderRadius: 20,
                  border: '1px solid rgba(0,229,255,0.2)'
                }
              }, [
                React.createElement('div', {
                  key: 'dot',
                  style: { width: 6, height: 6, borderRadius: '50%', background: '#00e5ff' }
                }),
                React.createElement('span', {
                  key: 'text',
                  style: { fontSize: 12, color: '#00e5ff', fontWeight: 600 }
                }, products.length + ' productos')
              ]),
              React.createElement('span', {
                key: 'user',
                style: { fontSize: 12, color: '#8090b0' }
              }, 'Admin • ' + user.email)
            ])
          ])
        ]),
        React.createElement('div', {
          key: 'right',
          style: { display: 'flex', gap: 12 }
        }, [
          React.createElement('button', {
            key: 'new',
            className: 'btn',
            onClick: () => setShowForm(!showForm),
            style: {
              padding: '12px 20px',
              borderRadius: 10,
              background: showForm ? 'rgba(239,68,68,0.9)' : 'linear-gradient(135deg, #00e5ff, #d946ef)',
              color: '#080810',
              fontSize: 14,
              fontWeight: 700,
              boxShadow: '0 4px 15px rgba(0,0,0,0.2)'
            }
          }, showForm ? '✕ Cancelar' : '+ Nuevo Producto'),
          React.createElement('button', {
            key: 'logout',
            className: 'btn',
            onClick: () => auth.signOut(),
            style: {
              padding: '12px 20px',
              borderRadius: 10,
              border: '1px solid rgba(255,255,255,0.1)',
              background: 'rgba(255,255,255,0.05)',
              color: '#a0a8b8',
              fontSize: 14,
              fontWeight: 500
            }
          }, 'Salir')
        ])
      ])
    ]),

    // Form
    showForm && React.createElement('div', {
      key: 'form',
      className: 'card',
      style: { padding: 24, marginBottom: 24, boxShadow: '0 8px 32px rgba(0,0,0,0.3)' }
    }, React.createElement('form', {
      onSubmit: handleSubmit
    }, [
      React.createElement('h3', {
        key: 'title',
        style: { margin: '0 0 20px', fontSize: 18, fontWeight: 700, color: '#eef0f6' }
      }, (editingId ? '✏️ Editar' : '✨ Nuevo') + ' Producto'),
      React.createElement('div', {
        key: 'grid1',
        style: {
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))',
          gap: 16,
          marginBottom: 16
        }
      }, [
        React.createElement('input', {
          key: 'name',
          className: 'input',
          type: 'text',
          placeholder: 'Nombre del producto',
          value: formData.name,
          onChange: (e) => setFormData(prev => ({ ...prev, name: e.target.value })),
          required: true
        }),
        React.createElement('input', {
          key: 'price',
          className: 'input',
          type: 'text',
          placeholder: 'Precio (ej: $ 1.500.000)',
          value: formData.price,
          onChange: (e) => setFormData(prev => ({ ...prev, price: e.target.value }))
        })
      ]),
      React.createElement('div', {
        key: 'grid2',
        style: {
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))',
          gap: 16,
          marginBottom: 16
        }
      }, [
        React.createElement('input', {
          key: 'oldprice',
          className: 'input',
          type: 'text',
          placeholder: 'Precio anterior (opcional)',
          value: formData.oldPrice,
          onChange: (e) => setFormData(prev => ({ ...prev, oldPrice: e.target.value }))
        }),
        React.createElement('select', {
          key: 'badge',
          className: 'input',
          value: formData.badge,
          onChange: (e) => setFormData(prev => ({ ...prev, badge: e.target.value }))
        }, [
          React.createElement('option', { key: 'none', value: '' }, 'Sin etiqueta'),
          React.createElement('option', { key: 'new', value: 'NUEVO' }, 'NUEVO'),
          React.createElement('option', { key: 'last', value: 'ÚLTIMO' }, 'ÚLTIMO'),
          React.createElement('option', { key: 'promo', value: 'PROMOCIÓN' }, 'PROMOCIÓN')
        ])
      ]),
      React.createElement('textarea', {
        key: 'description',
        className: 'input',
        placeholder: 'Descripción del producto',
        value: formData.description,
        onChange: (e) => setFormData(prev => ({ ...prev, description: e.target.value })),
        style: { width: '100%', minHeight: 80, marginBottom: 16, resize: 'vertical' }
      }),
      React.createElement('input', {
        key: 'specs',
        className: 'input',
        type: 'text',
        placeholder: 'Especificaciones (separadas por comas)',
        value: formData.specs,
        onChange: (e) => setFormData(prev => ({ ...prev, specs: e.target.value })),
        style: { width: '100%', marginBottom: 16 }
      }),
      React.createElement('div', {
        key: 'photos',
        style: { marginBottom: 20 }
      }, [
        React.createElement('label', {
          key: 'label',
          style: { display: 'block', marginBottom: 12, fontSize: 14, fontWeight: 600, color: '#a0a8b8' }
        }, '📸 Fotos del producto:'),
        React.createElement('input', {
          key: 'upload',
          type: 'file',
          accept: 'image/*',
          onChange: handlePhotoUpload,
          style: { marginBottom: 12, color: '#8090b0', fontSize: 14 }
        }),
        formData.photos.length > 0 && React.createElement('div', {
          key: 'grid',
          style: {
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fill, minmax(80px, 1fr))',
            gap: 12,
            maxWidth: 400
          }
        }, formData.photos.map((photo, i) =>
          React.createElement('div', {
            key: i,
            style: { position: 'relative' }
          }, [
            React.createElement('img', {
              key: 'img',
              src: photo,
              style: {
                width: '100%',
                height: 80,
                objectFit: 'cover',
                borderRadius: 8,
                border: '1px solid rgba(0,229,255,0.2)'
              }
            }),
            React.createElement('button', {
              key: 'remove',
              type: 'button',
              onClick: () => setFormData(prev => ({ ...prev, photos: prev.photos.filter((_, idx) => idx !== i) })),
              style: {
                position: 'absolute',
                top: -8,
                right: -8,
                width: 20,
                height: 20,
                borderRadius: '50%',
                background: '#ef4444',
                color: '#fff',
                border: 'none',
                fontSize: 12,
                cursor: 'pointer',
                boxShadow: '0 2px 8px rgba(0,0,0,0.3)'
              }
            }, '×')
          ])
        ))
      ]),
      React.createElement('div', {
        key: 'buttons',
        style: { display: 'flex', gap: 12 }
      }, [
        React.createElement('button', {
          key: 'submit',
          className: 'btn',
          type: 'submit',
          style: {
            padding: '12px 24px',
            borderRadius: 8,
            background: 'linear-gradient(135deg, #10b981, #059669)',
            color: '#fff',
            fontSize: 14,
            fontWeight: 700,
            boxShadow: '0 4px 15px rgba(16,185,129,0.3)'
          }
        }, (editingId ? '💾 Actualizar' : '✨ Crear') + ' Producto'),
        React.createElement('button', {
          key: 'cancel',
          className: 'btn',
          type: 'button',
          onClick: resetForm,
          style: {
            padding: '12px 24px',
            borderRadius: 8,
            border: '1px solid rgba(255,255,255,0.1)',
            background: 'rgba(255,255,255,0.05)',
            color: '#a0a8b8',
            fontSize: 14,
            fontWeight: 500
          }
        }, 'Cancelar')
      ])
    ])),

    // Products Grid
    products.length > 0 ? React.createElement('div', {
      key: 'products',
      style: {
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))',
        gap: 20
      }
    }, products.map(p =>
      React.createElement('div', {
        key: p.id,
        className: 'card',
        style: { overflow: 'hidden', position: 'relative' }
      }, [
        p.photos?.[0] && React.createElement('img', {
          key: 'image',
          src: p.photos[0],
          style: { width: '100%', height: 200, objectFit: 'cover' },
          loading: 'lazy'
        }),
        React.createElement('div', {
          key: 'content',
          style: { padding: 20 }
        }, [
          React.createElement('h4', {
            key: 'name',
            style: {
              margin: '0 0 8px',
              fontSize: 16,
              fontWeight: 700,
              color: '#eef0f6',
              lineHeight: 1.3
            }
          }, p.name || 'Sin nombre'),
          React.createElement('div', {
            key: 'price',
            style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }
          }, [
            React.createElement('span', {
              key: 'current',
              style: { fontSize: 18, fontWeight: 900, color: '#00e5ff' }
            }, p.price || '—'),
            p.oldPrice && React.createElement('span', {
              key: 'old',
              style: { fontSize: 14, color: '#6878a0', textDecoration: 'line-through' }
            }, p.oldPrice)
          ]),
          p.description && React.createElement('p', {
            key: 'description',
            style: {
              fontSize: 13,
              color: '#8090b0',
              lineHeight: 1.4,
              margin: '8px 0',
              display: '-webkit-box',
              WebkitLineClamp: 2,
              WebkitBoxOrient: 'vertical',
              overflow: 'hidden'
            }
          }, p.description),
          p.badge && React.createElement('span', {
            key: 'badge',
            style: {
              display: 'inline-block',
              padding: '3px 8px',
              borderRadius: 6,
              fontSize: 10,
              fontWeight: 700,
              textTransform: 'uppercase',
              background: 'rgba(0,229,255,0.15)',
              color: '#00e5ff',
              border: '1px solid rgba(0,229,255,0.3)',
              marginTop: 8
            }
          }, p.badge)
        ]),
        React.createElement('div', {
          key: 'actions',
          style: {
            position: 'absolute',
            top: 12,
            right: 12,
            display: 'flex',
            gap: 8
          }
        }, [
          React.createElement('button', {
            key: 'edit',
            className: 'btn',
            onClick: () => handleEdit(p),
            style: {
              width: 32,
              height: 32,
              borderRadius: 8,
              background: 'rgba(0,229,255,0.9)',
              color: '#080810',
              fontSize: 12,
              boxShadow: '0 4px 12px rgba(0,229,255,0.3)'
            }
          }, '✏️'),
          React.createElement('button', {
            key: 'delete',
            className: 'btn',
            onClick: () => handleDelete(p.id),
            style: {
              width: 32,
              height: 32,
              borderRadius: 8,
              background: 'rgba(239,68,68,0.9)',
              color: '#fff',
              fontSize: 12,
              boxShadow: '0 4px 12px rgba(239,68,68,0.3)'
            }
          }, '🗑️')
        ])
      ])
    )) : React.createElement(Empty, {
      key: 'empty',
      icon: '📦',
      title: 'Sin productos aún',
      subtitle: 'Agrega tu primer producto con el botón + Nuevo Producto'
    })
  ]));
}

// Main App Component
function App() {
  const [user, setUser] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const unsubscribe = auth.onAuthStateChanged((user) => {
      setUser(user);
      setLoading(false);
    });
    return () => unsubscribe();
  }, []);

  if (loading) {
    return React.createElement('div', {
      style: {
        minHeight: '100vh',
        background: '#080810',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center'
      }
    }, React.createElement('div', { className: 'loading' }));
  }

  const route = window.location.hash;

  if (route === '#catalogo') {
    return React.createElement(PublicCatalog);
  }

  if (user) {
    return React.createElement(AdminPanel, { user });
  }

  return React.createElement(LoginScreen);
}

// Render App
ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
