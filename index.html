<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;overflow-x:hidden}
body{background:#020610;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e8edf8;line-height:1.5}
#stars-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#root{position:relative;z-index:1;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:12px 16px}
.logo-sm{width:48px;height:48px;border-radius:12px;object-fit:cover;box-shadow:0 0 16px rgba(0,229,255,.4);flex-shrink:0}
.logo-lg{display:block;width:100%;max-width:280px;height:auto;margin:0 auto;filter:drop-shadow(0 0 16px rgba(0,229,255,.5)) drop-shadow(0 0 28px rgba(217,70,239,.4));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.spinner{width:38px;height:38px;border:3px solid rgba(0,229,255,.15);border-top-color:#00e5ff;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.card{background:rgba(8,12,22,0.85);border:1px solid rgba(0,229,255,.15);border-radius:14px;overflow:hidden;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.btn{padding:11px 18px;border-radius:8px;border:none;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;white-space:nowrap;display:inline-block;text-align:center;transition:opacity .15s,transform .15s}
.btn-p{background:linear-gradient(135deg,#00e5ff,#d946ef);color:#080810}
.btn-s{background:rgba(255,255,255,.06);color:#a0a8b8;border:1px solid rgba(255,255,255,.12)}
.btn:active{opacity:.8;transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.inp{padding:12px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#e8edf8;outline:none;font-family:inherit;font-size:16px;width:100%;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:rgba(0,229,255,.5)}
.grid{display:grid;gap:12px;margin-top:16px;grid-template-columns:repeat(2,1fr)}
@media(min-width:580px){.grid{grid-template-columns:repeat(3,1fr);gap:14px}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
.pcard{position:relative;cursor:pointer;transition:transform .2s;overflow:visible}
@media(hover:hover){.pcard:hover{transform:translateY(-4px)}}
.pimg{width:100%;height:155px;object-fit:cover;display:block}
@media(min-width:480px){.pimg{height:185px}}
@media(min-width:768px){.pimg{height:210px}}
.pcont{padding:11px}
.ptitle{font-size:13px;font-weight:700;margin-bottom:5px;background:linear-gradient(135deg,#fff,#e8edf8);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pprice{font-size:15px;font-weight:900;background:linear-gradient(135deg,#00e5ff,#d946ef);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pdesc{color:#a0b0c8;font-size:11px;line-height:1.4;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.acts{position:absolute;top:7px;right:7px;display:flex;gap:4px;z-index:2}
@media(hover:hover){.acts{opacity:0;transition:opacity .2s}.pcard:hover .acts{opacity:1}}
.abtn{width:32px;height:32px;border-radius:7px;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.abtn-e{background:rgba(0,229,255,.85)}
.abtn-d{background:rgba(239,68,68,.85)}
.fsec{background:rgba(8,12,26,0.88);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;margin-bottom:16px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.fgrid{display:grid;gap:12px;margin-bottom:14px}
@media(min-width:580px){.fgrid{grid-template-columns:1fr 1fr}}
.fphoto{border:2px dashed rgba(0,229,255,.3);border-radius:8px;padding:18px;text-align:center;background:rgba(0,229,255,.02);margin:10px 0;cursor:pointer}
.fphoto:active{background:rgba(0,229,255,.06)}
.fprev{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-top:10px}
.fpi{position:relative}
.fpi img{width:100%;height:56px;object-fit:cover;border-radius:6px;display:block}
.fpi-rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#ef4444;color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:1000;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
.modal-c{max-width:760px;margin:0 auto;background:#0d1120;min-height:100vh;display:flex;flex-direction:column}
.modal-imgs{position:relative}
.mimg{width:100%;height:78vw;max-height:480px;min-height:300px;object-fit:cover;display:block}
@media(min-width:480px){.mimg{height:65vw;max-height:500px}}
@media(min-width:768px){.mimg{height:460px;max-height:520px}}
.mthumbs{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.mthumb{width:54px;height:54px;flex-shrink:0;object-fit:cover;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.mthumb.on{border-color:#00e5ff}
.btn-wa{background:linear-gradient(135deg,#25d366,#1a9e50);color:#fff;font-weight:700;font-size:15px;border-radius:8px;border:none;cursor:pointer;font-family:inherit}
.minfo{padding:18px}
.mtitle{font-size:20px;font-weight:900;margin-bottom:9px;background:linear-gradient(135deg,#fff,#e8edf8);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@media(min-width:480px){.mtitle{font-size:24px}}
.mprice{font-size:22px;font-weight:900;background:linear-gradient(135deg,#00e5ff,#d946ef);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.mdesc{color:#a0b0c8;font-size:15px;line-height:1.65;margin-bottom:16px}
.close-btn{position:absolute;top:11px;right:11px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3}
.hdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding:14px 0;margin-bottom:4px}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.btitle{font-size:18px;font-weight:900;background:linear-gradient(135deg,#00e5ff,#d946ef);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bsub{font-size:11px;color:#8090b0;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.hbtns{display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:480px){
  .hdr{flex-direction:column;align-items:stretch}
  .hbtns{display:grid;grid-template-columns:1fr 1fr}
  .hbtns .btn-s:last-child{grid-column:span 2}
}
.lwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.badge-paused{position:absolute;top:0;left:0;right:0;background:rgba(251,191,36,.92);color:#080810;font-size:11px;font-weight:800;text-align:center;padding:4px;letter-spacing:.5px}
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.tab{padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;color:#8090b0;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.on{color:#00e5ff;border-bottom-color:#00e5ff}
.cat-tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(0,229,255,.15);color:#00e5ff;border:1px solid rgba(0,229,255,.3);margin-top:5px}
.cat-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.cat-item{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
.cat-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.inp-sm{padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#e8edf8;outline:none;font-family:inherit;font-size:14px}
.lcard{width:100%;max-width:380px;text-align:center}
</style>

<script>
(function(){
  var cv=document.getElementById('stars-canvas');
  if(!cv) return;
  var ctx=cv.getContext('2d'),stars=[],W,H;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  function mk(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.2,o:Math.random()*0.7+0.15,s:Math.random()*0.4+0.05,t:Math.random()*Math.PI*2,c:Math.random()<0.12?'rgba(0,229,255,':'rgba(255,255,255,'};}
  function init(){resize();stars=[];var n=Math.floor((W*H)/4800);for(var i=0;i<n;i++)stars.push(mk());}
  function draw(){ctx.clearRect(0,0,W,H);for(var i=0;i<stars.length;i++){var s=stars[i];s.t+=s.s*0.05;var o=s.o*(0.55+0.45*Math.sin(s.t));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.c+o+')';ctx.fill();}requestAnimationFrame(draw);}
  window.addEventListener('resize',init);init();draw();
})();
</script>

function compressImg(file,q){
  q=q||0.65;
  return new Promise(function(res){
    var c=document.createElement('canvas'),ctx=c.getContext('2d'),img=new Image();
    img.onload=function(){
      var m=700,r=Math.min(m/img.width,m/img.height,1);
      c.width=img.width*r;c.height=img.height*r;
      ctx.drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',q));
    };
    var fr=new FileReader();fr.onload=function(e){img.src=e.target.result;};fr.readAsDataURL(file);
  });
}
async function processImgs(files){
  var out=[];
  for(var i=0;i<files.length;i++) if(files[i].type.startsWith('image/')) out.push(await compressImg(files[i]));
  return out;
}

/* CATALOGO */
function Catalog(){
  var prods=React.useState([]),loading=React.useState(true),sel=React.useState(null),imgI=React.useState(0);

  // Leer productos de Firebase
  React.useEffect(function(){
    var ref=db.ref('products');
    function cb(snap){
      var d=snap.val();
      var lista=d?Object.keys(d).map(function(k){var o={id:k};var v=d[k];Object.keys(v).forEach(function(x){o[x]=v[x];});return o;}).filter(function(p){return !p.deleted;}):[];
      prods[1](lista);
      loading[1](false);
    }
    ref.on('value',cb);
    return function(){ref.off('value',cb);};
  },[]);

  // Sincronizar hash con producto seleccionado
  React.useEffect(function(){
    function onHash(){
      var h=location.hash;
      // formato: #catalogo/PRODUCT_ID
      var m=h.match(/^#catalogo\/(.+)$/);
      if(m){
        // buscar en prods actuales
        var found=prods[0].find(function(p){return p.id===m[1];});
        if(found){sel[1](found);imgI[1](0);}
        // si aun no cargaron, marcar id pendiente
        else{ window.__pendingProductId=m[1]; }
      } else {
        sel[1](null);imgI[1](0);
      }
    }
    window.addEventListener('hashchange',onHash);
    onHash(); // ejecutar al montar
    return function(){window.removeEventListener('hashchange',onHash);};
  },[prods[0]]);

  // Cuando cargan los productos, abrir el pendiente si hay
  React.useEffect(function(){
    if(window.__pendingProductId && prods[0].length>0){
      var found=prods[0].find(function(p){return p.id===window.__pendingProductId;});
      if(found){sel[1](found);imgI[1](0);window.__pendingProductId=null;}
    }
  },[prods[0]]);

  function open(p){
    location.hash='#catalogo/'+p.id;
    sel[1](p);imgI[1](0);
  }
  function close(){
    location.hash='#catalogo';
    sel[1](null);imgI[1](0);
  }
  if(loading[0]) return h(Spinner);
  if(sel[0]) return h('div',{className:'modal'},
    h('div',{className:'modal-c'},
      h('button',{className:'close-btn',onClick:close},'×'),
      h('div',{className:'modal-imgs'},
        sel[0].photos&&sel[0].photos[0]&&h('img',{className:'mimg',src:sel[0].photos[imgI[0]]||sel[0].photos[0]}),
        sel[0].photos&&sel[0].photos.length>1&&h('div',{className:'mthumbs'},
          sel[0].photos.map(function(ph,i){return h('img',{key:i,src:ph,className:'mthumb'+(i===imgI[0]?' on':''),onClick:function(){imgI[1](i);}});})
        )
      ),
      h('div',{className:'minfo'},
        h('h1',{className:'mtitle'},sel[0].name||'Sin nombre'),

/* APP */
function App(){
  var user=React.useState(null),loading=React.useState(true),route=React.useState(location.hash);
  React.useEffect(function(){
    var unsub=auth.onAuthStateChanged(function(u){user[1](u);loading[1](false);});
    function sync(){route[1](location.hash);}
    window.addEventListener('hashchange',sync);
    return function(){unsub();window.removeEventListener('hashchange',sync);};
  },[]);
  if(loading[0]) return h(Spinner);
  if(route[0]==='#catalogo'||route[0].indexOf('#catalogo/')===0) return h(Catalog);
  if(user[0]) return h(Admin,{user:user[0]});
  return h(Login);
}
ReactDOM.render(h(App),document.getElementById('root'));
