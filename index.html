<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IscoTech.Store - Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;color:#e8edf8;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.container{text-align:center;padding:40px;background:#1a1a2e;border-radius:16px;border:1px solid rgba(0,229,255,.2)}
.logo{width:80px;height:80px;background:linear-gradient(135deg,#00e5ff,#d946ef);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#080810;margin:0 auto 20px}
h1{font-size:24px;margin-bottom:8px;background:linear-gradient(135deg,#00e5ff,#d946ef);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#8090b0;margin-bottom:20px}
button{padding:12px 24px;background:linear-gradient(135deg,#00e5ff,#d946ef);color:#080810;border:none;border-radius:8px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="logo">IT</div>
  <h1>IscoTech.Store</h1>
  <p>Sitio funcionando correctamente</p>
  <button onclick="alert('¡Todo OK!')">Probar Interacción</button>
</div>
</body>
</html>
