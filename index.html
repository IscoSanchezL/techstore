// Image Compression Utility
const compressImage = (file, maxWidth = 800, quality = 0.7) => {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    img.onload = () => {
      const ratio = Math.min(maxWidth / img.width, maxWidth / img.height);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    
    const reader = new FileReader();
    reader.onload = (e) => img.src = e.target.result;
    reader.readAsDataURL(file);
  });
};

// Admin Panel Component  
function AdminPanel({ user }) {
  const [products, setProducts] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [showForm, setShowForm] = React.useState(false);
  const [editingId, setEditingId] = React.useState(null);
  const [formData, setFormData] = React.useState({
    name: '',
    price: '',
    oldPrice: '',
    description: '',
    badge: '',
    specs: '',
    photos: []
  });

  React.useEffect(() => {
    const ref = db.ref('products');
    ref.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        const list = Object.keys(data).map(key => ({ id: key, ...data[key] }))
          .filter(p => !p.deleted);
        setProducts(list);
      }
      setLoading(false);
    });
    return () => ref.off();
  }, []);

  const resetForm = () => {
    setFormData({ name: '', price: '', oldPrice: '', description: '', badge: '', specs: '', photos: [] });
    setEditingId(null);
    setShowForm(false);
  };

  const handleEdit = (product) => {
    setFormData({
      name: product.name || '',
      price: product.price || '',
      oldPrice: product.oldPrice || '',
      description: product.description || '',
      badge: product.badge || '',
      specs: product.specs ? product.specs.join(', ') : '',
      photos: product.photos || []
    });
    setEditingId(product.id);
    setShowForm(true);
  };

  const handleDelete = async (id) => {
    if (confirm('¿Eliminar este producto?')) {
      await db.ref('products/' + id).update({ deleted: true });
    }
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    const specs = formData.specs ? formData.specs.split(',').map(s => s.trim()).filter(s => s) : [];
    const productData = { ...formData, specs, updatedAt: Date.now() };

    try {
      if (editingId) {
        await db.ref('products/' + editingId).update(productData);
      } else {
        await db.ref('products').push(productData);

// Main App Component
function App() {
  const [user, setUser] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const unsubscribe = auth.onAuthStateChanged((user) => {
      setUser(user);
      setLoading(false);
    });
    return () => unsubscribe();
  }, []);

  if (loading) {
    return React.createElement('div', {
      style: {
        minHeight: '100vh',
        background: '#080810',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center'
      }
    }, React.createElement('div', {
      style: { textAlign: 'center' }
    }, [
      React.createElement('div', { key: 'spinner', className: 'loading-modern' }),
      React.createElement('p', { key: 'text', style: { marginTop: 20, color: '#6878a0', fontWeight: 500 } }, 'Iniciando IscoTech.Store...')
    ]));
  }

  const route = window.location.hash;

  if (route === '#catalogo') {
    return React.createElement(PublicCatalog);
  }

  if (user) {
    return React.createElement(AdminPanel, { user });
  }

  return React.createElement(LoginScreen);
}

// Render App
ReactDOM.render(React.createElement(App), document.getElementById('root'));
