<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TechStore - Catálogo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c10;font-family:'DM Sans','Segoe UI',system-ui,sans-serif;color:#e4e4e7;overflow-x:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
button{transition:all .15s ease;font-family:inherit;cursor:pointer}
button:hover{filter:brightness(1.12)}button:active{transform:scale(.97)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
input:focus,textarea:focus{border-color:rgba(167,139,250,.4)!important;outline:none}
.chv:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)!important}
.shv:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)!important}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect}=React;

/* ═══ FIREBASE ═══ */
const fbApp=firebase.initializeApp({
  apiKey:"AIzaSyAYKbbK7GqZgGKRl2-cWG8Gw8EGMYqS2HY",
  authDomain:"techstore-4eea2.firebaseapp.com",
  databaseURL:"https://techstore-4eea2-default-rtdb.firebaseio.com",
  projectId:"techstore-4eea2",
  storageBucket:"techstore-4eea2.firebasestorage.app",
  messagingSenderId:"429953715769",
  appId:"1:429953715769:web:6b3bb7d79faf577ed707e8"
});
const db=firebase.database();
const auth=firebase.auth();
const pRef=db.ref("products");
const tRef=db.ref("trash");

const listen=(ref,cb)=>{ref.on("value",s=>{const v=s.val();cb(v?Object.entries(v).map(([k,d])=>({...d,_k:k})):[])});return()=>ref.off()};

/* ═══ DATA ═══ */
const PRESETS=[
  {id:"obsidian",l:"Obsidian",bg:"#08080d",ac:"#00e5ff",tx:"#eef0f6",sb:"#6b7280",cb:"#111118",bd:"#1a1d2a"},
  {id:"snow",l:"Snow",bg:"#f7f7f2",ac:"#0f172a",tx:"#0f172a",sb:"#64748b",cb:"#ffffff",bd:"#e2e2dd"},
  {id:"cyber",l:"Cyber",bg:"#0a0015",ac:"#f43f5e",tx:"#ede9fe",sb:"#7c6f99",cb:"#120020",bd:"#2a1540"},
  {id:"forest",l:"Bosque",bg:"#0b1410",ac:"#34d399",tx:"#ecfdf5",sb:"#6b8a7a",cb:"#0f1f18",bd:"#1a3328"},
  {id:"sunset",l:"Atardecer",bg:"#1a0a05",ac:"#fb923c",tx:"#fff7ed",sb:"#9a7a6a",cb:"#1f1008",bd:"#3a2010"},
  {id:"royal",l:"Royal",bg:"#0a0520",ac:"#818cf8",tx:"#e0e7ff",sb:"#6b6f9a",cb:"#100830",bd:"#1e1548"},
];
const BADGES=["Nuevo","Oferta","Envío gratis","Último","Original","Garantía","Premium","2x1"];
const GRADS=[
  "linear-gradient(135deg,#667eea,#764ba2)","linear-gradient(135deg,#f093fb,#f5576c)",
  "linear-gradient(135deg,#4facfe,#00f2fe)","linear-gradient(135deg,#43e97b,#38f9d7)",
  "linear-gradient(135deg,#fa709a,#fee140)","linear-gradient(135deg,#a18cd1,#fbc2eb)",
  "linear-gradient(135deg,#fccb90,#d57eeb)","linear-gradient(135deg,#0c3483,#a2b6df)",
  "linear-gradient(135deg,#f7971e,#ffd200)","linear-gradient(135deg,#e44d26,#f16529)","none"
];
const mkP=()=>({id:Date.now().toString()+Math.random().toString(36).slice(2,6),name:"",price:"",oldPrice:"",desc:"",badge:"Nuevo",showBadge:true,specs:["","","",""],themeId:"obsidian",images:[],customColors:null,gradient:"none",createdAt:Date.now()});
const gT=p=>{const b=PRESETS.find(x=>x.id===p.themeId)||PRESETS[0];const t={bg:b.bg,accent:b.ac,text:b.tx,sub:b.sb,cardBg:b.cb,border:b.bd,id:b.id};if(p.customColors)return{...t,...p.customColors};return t};
const tAgo=ts=>{const d=Date.now()-ts;if(d<60000)return"hace un momento";if(d<3600000)return`hace ${Math.floor(d/60000)}min`;if(d<86400000)return`hace ${Math.floor(d/3600000)}h`;return`hace ${Math.floor(d/86400000)}d`};

/* ═══ LOGIN ═══ */
function Login({onAuth}){
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const go=async()=>{
    setLoading(true);setErr("");
    try{await auth.signInWithEmailAndPassword(email,pass)}
    catch(e){setErr(e.code==="auth/wrong-password"?"Contraseña incorrecta":e.code==="auth/user-not-found"?"Usuario no encontrado":"Error: "+e.message)}
    setLoading(false);
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"linear-gradient(135deg,#0c0c10 0%,#1a0a20 100%)"}}>
      <div style={{width:"100%",maxWidth:380,background:"rgba(255,255,255,.03)",borderRadius:20,padding:"40px 32px",border:"1px solid rgba(255,255,255,.06)",boxShadow:"0 20px 60px rgba(0,0,0,.4)",animation:"fadeIn .5s ease"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40,marginBottom:8}}>⬡</div>
          <h1 style={{fontSize:22,fontWeight:900,letterSpacing:"-.03em"}}>
            <span style={{background:"linear-gradient(135deg,#a78bfa,#06b6d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TechStore</span>
          </h1>
          <p style={{fontSize:12,color:"#52525b",marginTop:4}}>Inicia sesión para administrar</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Correo electrónico" type="email"
            style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,.08)",background:"rgba(255,255,255,.04)",color:"#e4e4e7",fontSize:14,outline:"none",boxSizing:"border-box"}} />
          <input value={pass} onChange={e=>setPass(e.target.value)} placeholder="Contraseña" type="password"
            onKeyDown={e=>e.key==="Enter"&&go()}
            style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,.08)",background:"rgba(255,255,255,.04)",color:"#e4e4e7",fontSize:14,outline:"none",boxSizing:"border-box"}} />
          {err&&<p style={{fontSize:12,color:"#f87171",textAlign:"center"}}>{err}</p>}
          <button onClick={go} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#a78bfa,#06b6d4)",color:"#fff",fontSize:14,fontWeight:700,opacity:loading?.6:1}}>
            {loading?"Entrando...":"Iniciar sesión"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══ PUBLIC CATALOG (shareable) ═══ */
function PublicCatalog(){
  const[products,setProducts]=useState([]);
  const[loading,setLoading]=useState(true);
  const[selected,setSelected]=useState(null);
  const[imgIdx,setImgIdx]=useState(0);

  useEffect(()=>{const u=listen(pRef,d=>{setProducts(d);setLoading(false)});return u},[]);

  if(loading)return <Spinner msg="Cargando catálogo..." />;

  const p=selected?products.find(x=>x.id===selected):null;
  const t=p?gT(p):null;

  return(
    <div style={{minHeight:"100vh",background:"#fafaf9",color:"#1a1a2e"}}>
      <div style={{maxWidth:940,margin:"0 auto",padding:"24px 16px"}}>
        {/* Header */}
        <div style={{textAlign:"center",marginBottom:28,paddingBottom:20,borderBottom:"1px solid #f0f0eb"}}>
          <h1 style={{fontSize:26,fontWeight:900,letterSpacing:"-.03em",margin:0}}>
            <span style={{background:"linear-gradient(135deg,#6366f1,#06b6d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TechStore</span>
          </h1>
          <p style={{fontSize:12,color:"#94a3b8",marginTop:4}}>{products.length} producto{products.length!==1?"s":""} disponible{products.length!==1?"s":""}</p>
        </div>

        {selected&&p?(
          <div style={{animation:"fadeIn .3s ease"}}>
            <button onClick={()=>{setSelected(null);setImgIdx(0)}} style={{marginBottom:16,padding:"8px 16px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#475569",fontSize:12,fontWeight:600}}>← Volver al catálogo</button>
            <div style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"}}>
              {/* Gallery */}
              <div style={{height:340,background:p.gradient!=="none"?p.gradient:t.bg,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
                {p.images?.length>0?(
                  <React.Fragment>
                    <img src={p.images[imgIdx]||p.images[0]} style={{maxWidth:"85%",maxHeight:"85%",objectFit:"contain",filter:"drop-shadow(0 8px 24px rgba(0,0,0,.25))"}} />
                    {p.images.length>1&&(
                      <React.Fragment>
                        <button onClick={()=>setImgIdx(i=>Math.max(0,i-1))} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",width:36,height:36,borderRadius:"50%",border:"none",background:"rgba(0,0,0,.4)",color:"#fff",fontSize:18}}>‹</button>
                        <button onClick={()=>setImgIdx(i=>Math.min(p.images.length-1,i+1))} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",width:36,height:36,borderRadius:"50%",border:"none",background:"rgba(0,0,0,.4)",color:"#fff",fontSize:18}}>›</button>
                      </React.Fragment>
                    )}
                  </React.Fragment>
                ):<span style={{fontSize:48,opacity:.2}}>📷</span>}
              </div>
              {p.images?.length>1&&(
                <div style={{display:"flex",gap:6,padding:"10px 16px",overflowX:"auto"}}>
                  {p.images.map((img,i)=>(
                    <div key={i} onClick={()=>setImgIdx(i)} style={{width:56,height:56,borderRadius:8,overflow:"hidden",border:imgIdx===i?"2px solid #6366f1":"1px solid #e2e8f0",cursor:"pointer",flexShrink:0}}>
                      <img src={img} style={{width:"100%",height:"100%",objectFit:"cover"}} />
                    </div>
                  ))}
                </div>
              )}
              <div style={{padding:"24px 28px"}}>
                {p.showBadge&&<span style={{display:"inline-block",marginBottom:10,padding:"4px 14px",borderRadius:20,background:t.accent,color:"#fff",fontSize:10,fontWeight:800,textTransform:"uppercase"}}>{p.badge}</span>}
                <h2 style={{margin:0,fontSize:24,fontWeight:800,color:"#0f172a"}}>{p.name}</h2>
                <div style={{margin:"10px 0",display:"flex",alignItems:"baseline",gap:8}}>
                  <span style={{fontSize:30,fontWeight:900,color:"#0f172a"}}>{p.price}</span>
                  {p.oldPrice&&<span style={{fontSize:16,color:"#94a3b8",textDecoration:"line-through"}}>{p.oldPrice}</span>}
                </div>
                {p.desc&&<p style={{margin:"0 0 16px",fontSize:14,color:"#64748b",lineHeight:1.6}}>{p.desc}</p>}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {(p.specs||[]).filter(Boolean).map((s,i)=><span key={i} style={{padding:"6px 14px",borderRadius:8,fontSize:11,fontWeight:600,background:"#f1f5f9",color:"#475569"}}>{s}</span>)}
                </div>
              </div>
            </div>
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:14}}>
            {products.map((p,i)=>{
              const th=gT(p);
              return(
                <div key={p._k||p.id} onClick={()=>{setSelected(p.id);setImgIdx(0)}} className="shv"
                  style={{borderRadius:14,overflow:"hidden",background:"#fff",border:"1px solid #f1f5f9",cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.03)",animation:`fadeIn .3s ease ${i*40}ms both`,transition:"all .25s"}}>
                  <div style={{height:150,background:p.gradient!=="none"?p.gradient:th.bg,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",position:"relative"}}>
                    {p.images?.[0]?<img src={p.images[0]} style={{maxWidth:"80%",maxHeight:"85%",objectFit:"contain",filter:"drop-shadow(0 4px 10px rgba(0,0,0,.2))"}} />:<span style={{fontSize:28,opacity:.2}}>📷</span>}
                    {p.images?.length>1&&<span style={{position:"absolute",bottom:4,right:6,fontSize:8,color:"rgba(255,255,255,.6)",background:"rgba(0,0,0,.35)",padding:"2px 6px",borderRadius:6,fontWeight:700}}>{p.images.length} fotos</span>}
                    {p.showBadge&&<span style={{position:"absolute",top:8,left:8,padding:"3px 9px",borderRadius:10,background:th.accent,color:"#fff",fontSize:8,fontWeight:800,textTransform:"uppercase"}}>{p.badge}</span>}
                  </div>
                  <div style={{padding:"10px 12px"}}>
                    <h3 style={{margin:0,fontSize:13,fontWeight:700,color:"#0f172a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name||"Sin nombre"}</h3>
                    <div style={{display:"flex",alignItems:"baseline",gap:6,marginTop:3}}>
                      <span style={{fontSize:16,fontWeight:800,color:th.accent}}>{p.price||"—"}</span>
                      {p.oldPrice&&<span style={{fontSize:10,color:"#94a3b8",textDecoration:"line-through"}}>{p.oldPrice}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {products.length===0&&<Empty icon="📦" title="Sin productos aún" sub="El catálogo estará disponible pronto" light />}
      </div>
    </div>
  );
}

/* ═══ ADMIN APP ═══ */
function AdminApp({user}){
  const[products,setProducts]=useState([]);
  const[trash,setTrash]=useState([]);
  const[view,setView]=useState("catalog");
  const[current,setCurrent]=useState(null);
  const[search,setSearch]=useState("");
  const[toast,setToast]=useState("");
  const[showTrash,setShowTrash]=useState(false);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{
    let r=0;const ck=()=>{r++;if(r>=2)setLoading(false)};
    const u1=listen(pRef,d=>{setProducts(d);ck()});
    const u2=listen(tRef,d=>{setTrash(d);ck()});
    return()=>{u1();u2()};
  },[]);

  const flash=m=>{setToast(m);setTimeout(()=>setToast(""),2500)};
  const addNew=()=>{setCurrent(mkP());setView("editor")};
  const edit=p=>{setCurrent(JSON.parse(JSON.stringify(p)));setView("editor")};

  const del=p=>{if(!p._k)return;const{_k,...c}=p;pRef.child(_k).remove();tRef.push({...c,deletedAt:Date.now()});flash("Movido a papelera 🗑")};
  const restore=p=>{if(!p._k)return;const{_k,deletedAt,...c}=p;tRef.child(_k).remove();pRef.push(c);flash("Restaurado ✓")};
  const permaDel=p=>{if(!p._k)return;tRef.child(p._k).remove();flash("Eliminado")};
  const emptyT=()=>{tRef.remove();flash("Papelera vaciada")};
  const dup=p=>{const{_k,...c}=p;c.id=Date.now().toString()+Math.random().toString(36).slice(2,6);c.name+=" (copia)";pRef.push(c);flash("Duplicado ✓")};
  const saveP=p=>{const{_k,...c}=p;if(_k){pRef.child(_k).set(c)}else{pRef.push(c)}setView("catalog");flash("Guardado ✓")};

  const filtered=products.filter(p=>(p.name||"").toLowerCase().includes(search.toLowerCase())||(p.desc||"").toLowerCase().includes(search.toLowerCase()));

  if(loading)return <Spinner msg="Cargando datos..." />;

  return(
    <div style={{minHeight:"100vh"}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:9999,padding:"10px 24px",borderRadius:12,background:"#10b981",color:"#fff",fontSize:13,fontWeight:700,boxShadow:"0 8px 30px rgba(16,185,129,.3)",animation:"fadeIn .3s ease"}}>{toast}</div>}

      {view==="catalog"?(
        showTrash?(
          <TrashView trash={trash} onRestore={restore} onPermaDel={permaDel} onEmpty={emptyT} onBack={()=>setShowTrash(false)} />
        ):(
          <div style={{maxWidth:1000,margin:"0 auto",padding:"20px 16px"}}>
            {/* Header */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:20}}>
              <div>
                <h1 style={{margin:0,fontSize:24,fontWeight:900,letterSpacing:"-.03em"}}>
                  <span style={{background:"linear-gradient(135deg,#a78bfa,#06b6d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TechStore</span>
                  <span style={{fontSize:12,fontWeight:400,color:"#52525b",marginLeft:8}}>Admin</span>
                </h1>
                <p style={{margin:"2px 0 0",fontSize:11,color:"#3f3f46"}}>{products.length} producto{products.length!==1?"s":""} · Firebase sync ✓</p>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                <Btn onClick={()=>setShowTrash(true)} v="ghost" icon="🗑" label={`(${trash.length})`} />
                <Btn onClick={addNew} v="primary" icon="+" label="Nuevo" />
                <button onClick={()=>auth.signOut()} style={{padding:"6px 10px",borderRadius:7,border:"1px solid rgba(255,255,255,.06)",background:"transparent",color:"#52525b",fontSize:10,cursor:"pointer"}}>Salir</button>
              </div>
            </div>

            {products.length>0&&<input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar..."
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,.06)",background:"rgba(255,255,255,.03)",color:"#e4e4e7",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:16}} />}

            {filtered.length===0?<Empty icon="📦" title={products.length===0?"Catálogo vacío":"Sin resultados"} sub={products.length===0?"Crea tu primer producto":"Prueba otra búsqueda"} />:(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14}}>
                {filtered.map((p,i)=><ProdCard key={p._k||p.id} p={p} t={gT(p)} onEdit={()=>edit(p)} onDel={()=>del(p)} onDup={()=>dup(p)} delay={i*50} />)}
              </div>
            )}
          </div>
        )
      ):(
        <EditorView product={current} onSave={saveP} onCancel={()=>setView("catalog")} />
      )}
    </div>
  );
}

function ProdCard({p,t,onEdit,onDel,onDup,delay}){
  const[menu,setMenu]=useState(false);
  return(
    <div className="chv" style={{borderRadius:14,overflow:"hidden",border:"1px solid rgba(255,255,255,.05)",background:"rgba(255,255,255,.02)",cursor:"pointer",animation:`fadeIn .4s ease ${delay}ms both`,position:"relative",transition:"all .25s"}}>
      <div onClick={onEdit} style={{height:150,background:p.gradient!=="none"?p.gradient:t.bg,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",position:"relative"}}>
        {p.showBadge&&<span style={{position:"absolute",top:8,left:8,padding:"3px 9px",borderRadius:10,background:t.accent,color:t.id==="snow"?"#fff":t.bg,fontSize:9,fontWeight:800,textTransform:"uppercase",zIndex:2}}>{p.badge}</span>}
        {p.images?.[0]?<img src={p.images[0]} style={{maxWidth:"80%",maxHeight:"85%",objectFit:"contain",filter:"drop-shadow(0 4px 12px rgba(0,0,0,.3))"}} />:<span style={{fontSize:32,opacity:.2}}>📷</span>}
        {p.images?.length>1&&<span style={{position:"absolute",bottom:6,right:8,fontSize:9,color:"rgba(255,255,255,.5)",background:"rgba(0,0,0,.4)",padding:"2px 7px",borderRadius:8,fontWeight:700}}>+{p.images.length-1}</span>}
      </div>
      <div onClick={onEdit} style={{padding:"10px 12px"}}>
        <h3 style={{margin:0,fontSize:13,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name||"Sin nombre"}</h3>
        <div style={{display:"flex",alignItems:"baseline",gap:6,marginTop:3}}>
          <span style={{fontSize:15,fontWeight:800,color:t.accent}}>{p.price||"—"}</span>
          {p.oldPrice&&<span style={{fontSize:10,color:"#52525b",textDecoration:"line-through"}}>{p.oldPrice}</span>}
        </div>
      </div>
      <div style={{position:"absolute",top:6,right:6}}>
        <button onClick={e=>{e.stopPropagation();setMenu(!menu)}} style={{width:26,height:26,borderRadius:7,border:"none",background:"rgba(0,0,0,.5)",color:"#ccc",fontSize:13,backdropFilter:"blur(6px)"}}>⋯</button>
        {menu&&<div style={{position:"absolute",top:30,right:0,background:"#27272a",borderRadius:10,border:"1px solid rgba(255,255,255,.08)",overflow:"hidden",minWidth:120,zIndex:20,boxShadow:"0 8px 30px rgba(0,0,0,.5)"}}>
          {[{l:"✏️ Editar",a:onEdit},{l:"📋 Duplicar",a:onDup},{l:"🗑 Eliminar",a:onDel,d:true}].map(it=>(
            <button key={it.l} onClick={e=>{e.stopPropagation();setMenu(false);it.a()}} style={{display:"block",width:"100%",padding:"8px 12px",border:"none",textAlign:"left",background:"transparent",color:it.d?"#f87171":"#e4e4e7",fontSize:11.5,fontWeight:600}}>{it.l}</button>
          ))}
        </div>}
      </div>
    </div>
  );
}

/* ═══ TRASH ═══ */
function TrashView({trash,onRestore,onPermaDel,onEmpty,onBack}){
  return(
    <div style={{maxWidth:800,margin:"0 auto",padding:"20px 16px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Btn onClick={onBack} v="ghost" icon="←" label="Volver" />
          <h2 style={{margin:0,fontSize:18,fontWeight:800}}>🗑 Papelera ({trash.length})</h2>
        </div>
        {trash.length>0&&<Btn onClick={()=>{if(confirm("¿Vaciar papelera?"))onEmpty()}} v="danger" icon="⚠" label="Vaciar" />}
      </div>
      {trash.length===0?<Empty icon="✨" title="Vacía" sub="Los eliminados aparecerán aquí" />:(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {trash.map(p=>(
            <div key={p._k} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:12,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",animation:"fadeIn .3s"}}>
              <div style={{width:44,height:44,borderRadius:8,background:"rgba(255,255,255,.04)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
                {p.images?.[0]?<img src={p.images[0]} style={{width:"100%",height:"100%",objectFit:"cover"}} />:<span style={{fontSize:18,opacity:.3}}>📷</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:0,fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name||"Sin nombre"}</p>
                <p style={{margin:0,fontSize:10,color:"#52525b"}}>{tAgo(p.deletedAt)}</p>
              </div>
              <Btn onClick={()=>onRestore(p)} v="ghost" icon="♻️" label="Restaurar" />
              <Btn onClick={()=>{if(confirm("¿Eliminar permanentemente?"))onPermaDel(p)}} v="danger" icon="✕" label="" />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══ EDITOR ═══ */
function EditorView({product:init,onSave,onCancel}){
  const[p,setP]=useState(init);
  const[preview,setPreview]=useState(false);
  const[imgIdx,setImgIdx]=useState(0);
  const[cTab,setCTab]=useState("presets");
  const fileRef=useRef(null);
  const cardRef=useRef(null);

  const set=(k,v)=>setP(pr=>({...pr,[k]:v}));
  const setSp=(i,v)=>{const s=[...p.specs];s[i]=v;set("specs",s)};
  const setCc=(k,v)=>set("customColors",{...(p.customColors||{}),[k]:v});

  const addImgs=useCallback(e=>{
    Array.from(e.target.files||[]).forEach(f=>{
      const r=new FileReader();
      r.onload=ev=>setP(pr=>({...pr,images:[...pr.images,ev.target.result]}));
      r.readAsDataURL(f);
    });
  },[]);

  const rmImg=i=>{setP(pr=>({...pr,images:pr.images.filter((_,x)=>x!==i)}));setImgIdx(0)};

  const exportImg=async()=>{
    try{
      const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
      document.head.appendChild(s);
      await new Promise(r=>{s.onload=r;setTimeout(r,3000)});
      const t=gT(p);
      const canvas=await window.html2canvas(cardRef.current,{scale:2,useCORS:true,backgroundColor:t.bg});
      const a=document.createElement("a");a.download=`${p.name||"producto"}.png`;a.href=canvas.toDataURL("image/png");a.click();
    }catch{alert("Usa captura de pantalla")}
  };

  const t=gT(p);

  return(
    <div style={{maxWidth:1100,margin:"0 auto",padding:"12px 16px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:14,paddingBottom:10,borderBottom:"1px solid rgba(255,255,255,.05)"}}>
        <Btn onClick={onCancel} v="ghost" icon="←" label="Catálogo" />
        <div style={{display:"flex",gap:6}}>
          <Btn onClick={()=>setPreview(!preview)} v="ghost" icon={preview?"✏️":"👁"} label={preview?"Editar":"Preview"} />
          <Btn onClick={exportImg} v="ghost" icon="⬇" label="PNG" />
          <Btn onClick={()=>onSave(p)} v="success" icon="💾" label="Guardar" />
        </div>
      </div>

      <div style={{display:"flex",flexWrap:"wrap",gap:18}}>
        {!preview&&(
          <div style={{flex:"1 1 300px",minWidth:270,display:"flex",flexDirection:"column",gap:12,maxHeight:"calc(100vh - 100px)",overflowY:"auto",paddingRight:4}}>
            {/* Photos */}
            <Sec title={`Fotos (${p.images.length})`}>
              <input ref={fileRef} type="file" accept="image/*" multiple onChange={addImgs} style={{display:"none"}} />
              <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:"16px",borderRadius:8,border:"2px dashed rgba(255,255,255,.1)",background:"rgba(255,255,255,.02)",color:"#71717a",fontSize:12}}>
                📷 {p.images.length>0?"Agregar más fotos":"Subir fotos (varias a la vez)"}
              </button>
              {p.images.length>0&&(
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                  {p.images.map((img,i)=>(
                    <div key={i} style={{position:"relative",width:56,height:56,borderRadius:8,overflow:"hidden",border:imgIdx===i?"2px solid #a78bfa":"1px solid rgba(255,255,255,.08)",cursor:"pointer",flexShrink:0}} onClick={()=>setImgIdx(i)}>
                      <img src={img} style={{width:"100%",height:"100%",objectFit:"cover"}} />
                      <button onClick={e=>{e.stopPropagation();rmImg(i)}} style={{position:"absolute",top:1,right:1,width:16,height:16,borderRadius:"50%",border:"none",background:"rgba(239,68,68,.85)",color:"#fff",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                    </div>
                  ))}
                </div>
              )}
            </Sec>

            <Sec title="Nombre"><Inp value={p.name} onChange={v=>set("name",v)} ph="Nombre del producto" /></Sec>
            <Sec title="Precio">
              <div style={{display:"flex",gap:6}}>
                <Inp value={p.price} onChange={v=>set("price",v)} ph="$ Precio" />
                <Inp value={p.oldPrice} onChange={v=>set("oldPrice",v)} ph="Antes (opc.)" />
              </div>
            </Sec>
            <Sec title="Descripción">
              <textarea value={p.desc} onChange={e=>set("desc",e.target.value)} rows={2} placeholder="Describe tu producto..."
                style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid rgba(255,255,255,.08)",background:"rgba(255,255,255,.04)",color:"#e4e4e7",fontSize:12,resize:"vertical",outline:"none",boxSizing:"border-box"}} />
            </Sec>
            <Sec title="Etiqueta">
              <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                <label style={{fontSize:10,display:"flex",alignItems:"center",gap:3,cursor:"pointer",color:"#71717a"}}>
                  <input type="checkbox" checked={p.showBadge} onChange={e=>set("showBadge",e.target.checked)} /> On
                </label>
                {BADGES.map(b=><button key={b} onClick={()=>set("badge",b)} style={{padding:"2px 7px",borderRadius:5,fontSize:9.5,fontWeight:600,border:p.badge===b?"1px solid #a78bfa":"1px solid rgba(255,255,255,.05)",background:p.badge===b?"rgba(167,139,250,.15)":"transparent",color:p.badge===b?"#c4b5fd":"#52525b"}}>{b}</button>)}
              </div>
            </Sec>
            <Sec title="Specs">
              {p.specs.map((s,i)=><Inp key={i} value={s} onChange={v=>setSp(i,v)} ph={`Spec ${i+1}`} style={{marginBottom:3}} />)}
            </Sec>
            {/* Colors */}
            <Sec title="Tema / Color">
              <div style={{display:"flex",gap:4,marginBottom:8}}>
                {["presets","custom","gradient"].map(tab=>(
                  <button key={tab} onClick={()=>setCTab(tab)} style={{flex:1,padding:"5px",borderRadius:6,border:cTab===tab?"1px solid #a78bfa":"1px solid rgba(255,255,255,.05)",background:cTab===tab?"rgba(167,139,250,.1)":"transparent",color:cTab===tab?"#c4b5fd":"#52525b",fontSize:10,fontWeight:600,textTransform:"capitalize"}}>{tab==="presets"?"Temas":tab==="custom"?"Colores":"Degradado"}</button>
                ))}
              </div>
              {cTab==="presets"&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                  {PRESETS.filter(x=>x.id!=="custom").map(tp=>(
                    <button key={tp.id} onClick={()=>{set("themeId",tp.id);set("customColors",null)}} style={{padding:"8px 4px",borderRadius:8,border:p.themeId===tp.id&&!p.customColors?"2px solid #a78bfa":"1px solid rgba(255,255,255,.06)",background:tp.bg,color:tp.tx,fontSize:10,fontWeight:600}}>
                      <span style={{display:"block",width:10,height:10,borderRadius:"50%",background:tp.ac,margin:"0 auto 3px"}} />{tp.l}
                    </button>
                  ))}
                </div>
              )}
              {cTab==="custom"&&(
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {[["Fondo","bg"],["Acento","accent"],["Texto","text"],["Sub","sub"]].map(([label,key])=>(
                    <div key={key} style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:10,color:"#71717a",width:45}}>{label}</span>
                      <input type="color" value={(p.customColors?.[key])||t[key]} onChange={e=>{set("themeId","custom");setCc(key,e.target.value)}}
                        style={{width:28,height:22,border:"none",borderRadius:4,cursor:"pointer",background:"transparent"}} />
                      <span style={{fontSize:9,color:"#3f3f46",fontFamily:"monospace"}}>{(p.customColors?.[key])||t[key]}</span>
                    </div>
                  ))}
                </div>
              )}
              {cTab==="gradient"&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}}>
                  {GRADS.map((g,i)=>(
                    <button key={i} onClick={()=>set("gradient",g)} style={{width:"100%",height:28,borderRadius:6,border:p.gradient===g?"2px solid #a78bfa":"1px solid rgba(255,255,255,.08)",background:g==="none"?"rgba(255,255,255,.04)":g,fontSize:9,color:g==="none"?"#52525b":"transparent"}}>{g==="none"?"Sin":""}</button>
                  ))}
                </div>
              )}
            </Sec>
          </div>
        )}

        {/* Live preview card */}
        <div style={{flex:"1 1 440px",display:"flex",justifyContent:"center",alignItems:"flex-start"}}>
          <div ref={cardRef} style={{width:460,background:t.bg,borderRadius:18,overflow:"hidden",border:`1px solid ${t.border}`,boxShadow:"0 20px 60px rgba(0,0,0,.5)",position:"relative"}}>
            {p.showBadge&&p.badge&&<div style={{position:"absolute",top:16,left:16,zIndex:3,padding:"5px 14px",borderRadius:20,background:t.accent,color:t.id==="snow"?"#fff":t.bg,fontSize:11,fontWeight:800,letterSpacing:".04em",textTransform:"uppercase"}}>{p.badge}</div>}
            <div style={{width:"100%",height:320,background:p.gradient!=="none"?p.gradient:t.cardBg,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",position:"relative",borderBottom:`1px solid ${t.border}`}}>
              {p.images.length>0?(
                <React.Fragment>
                  <img src={p.images[imgIdx]||p.images[0]} style={{maxWidth:"88%",maxHeight:"88%",objectFit:"contain",filter:"drop-shadow(0 10px 30px rgba(0,0,0,.35))"}} />
                  {p.images.length>1&&(
                    <div style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",display:"flex",gap:5}}>
                      {p.images.map((_,i)=><button key={i} onClick={()=>setImgIdx(i)} style={{width:i===imgIdx?18:7,height:7,borderRadius:4,border:"none",background:i===imgIdx?t.accent:"rgba(255,255,255,.25)",cursor:"pointer",transition:"all .2s"}} />)}
                    </div>
                  )}
                </React.Fragment>
              ):(
                <div style={{textAlign:"center",color:t.sub}}><div style={{fontSize:44,marginBottom:6,opacity:.25}}>📷</div><span style={{fontSize:13}}>Sube fotos</span></div>
              )}
              <div style={{position:"absolute",bottom:0,left:0,right:0,height:50,background:`linear-gradient(transparent,${t.bg})`}} />
            </div>
            <div style={{padding:"18px 24px 24px"}}>
              <h2 style={{margin:0,fontSize:22,fontWeight:800,color:t.text,letterSpacing:"-.02em",lineHeight:1.2}}>{p.name||"Nombre del producto"}</h2>
              <div style={{margin:"10px 0",display:"flex",alignItems:"baseline",gap:8}}>
                <span style={{fontSize:28,fontWeight:900,color:t.accent}}>{p.price||"$0"}</span>
                {p.oldPrice&&<span style={{fontSize:15,color:t.sub,textDecoration:"line-through"}}>{p.oldPrice}</span>}
              </div>
              {p.desc&&<p style={{margin:"0 0 14px",fontSize:13,color:t.sub,lineHeight:1.5}}>{p.desc}</p>}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {p.specs.filter(Boolean).map((s,i)=><span key={i} style={{padding:"5px 12px",borderRadius:7,fontSize:10.5,fontWeight:600,background:t.cardBg,border:`1px solid ${t.border}`,color:t.sub}}>{s}</span>)}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ SHARED COMPONENTS ═══ */
function Sec({title,children}){
  return <div style={{background:"rgba(255,255,255,.02)",borderRadius:10,padding:"10px 12px",border:"1px solid rgba(255,255,255,.04)"}}>
    <div style={{fontSize:9.5,fontWeight:700,color:"#52525b",textTransform:"uppercase",letterSpacing:".06em",marginBottom:7}}>{title}</div>{children}</div>;
}
function Inp({value,onChange,ph,style={}}){
  return <input value={value} onChange={e=>onChange(e.target.value)} placeholder={ph}
    style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid rgba(255,255,255,.08)",background:"rgba(255,255,255,.04)",color:"#e4e4e7",fontSize:12,outline:"none",boxSizing:"border-box",...style}} />;
}
function Btn({onClick,v="ghost",icon,label,disabled}){
  const s={ghost:{padding:"7px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,.08)",background:"transparent",color:"#a1a1aa"},
    primary:{padding:"7px 16px",borderRadius:8,border:"none",background:"#a78bfa",color:"#0a0a0f"},
    success:{padding:"7px 16px",borderRadius:8,border:"none",background:"#10b981",color:"#fff"},
    danger:{padding:"7px 12px",borderRadius:8,border:"1px solid rgba(239,68,68,.2)",background:"rgba(239,68,68,.1)",color:"#f87171"}};
  return <button onClick={onClick} disabled={disabled} style={{...s[v],fontSize:12,fontWeight:700,opacity:disabled?.4:1,display:"flex",alignItems:"center",gap:4}}>{icon} {label}</button>;
}
function Empty({icon,title,sub,light}){
  return <div style={{textAlign:"center",padding:"50px 20px",color:light?"#94a3b8":"#3f3f46"}}><div style={{fontSize:44,marginBottom:8,opacity:.25}}>{icon}</div><p style={{fontSize:14,fontWeight:600,color:light?"#64748b":"#52525b"}}>{title}</p><p style={{fontSize:11}}>{sub}</p></div>;
}
function Spinner({msg}){
  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
    <div style={{width:36,height:36,border:"3px solid rgba(167,139,250,.2)",borderTopColor:"#a78bfa",borderRadius:"50%",animation:"spin .8s linear infinite"}}></div>
    <span style={{fontSize:13,color:"#52525b"}}>{msg}</span></div>;
}

/* ═══ ROOT ═══ */
function Root(){
  const[user,setUser]=useState(undefined);
  const isPublic=window.location.hash==="#catalogo";

  useEffect(()=>{auth.onAuthStateChanged(u=>setUser(u||null))},[]);

  if(isPublic)return <PublicCatalog />;
  if(user===undefined)return <Spinner msg="Cargando..." />;
  if(!user)return <Login />;
  return <AdminApp user={user} />;
}

ReactDOM.render(<Root />,document.getElementById("root"));
</script>
</body>
